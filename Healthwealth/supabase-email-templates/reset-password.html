<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your Healthwealth password</title>
  </head>
  <body style="margin:0;background:#f6f8fc;font-family:Arial,Helvetica,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f8fc;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;box-shadow:0 18px 45px rgba(7,87,230,0.12);">
            <tr>
              <td style="background:#0757e6;padding:30px 34px;color:#ffffff;">
                <div style="font-size:22px;font-weight:800;">Healthwealth</div>
                <div style="margin-top:8px;font-size:14px;line-height:22px;color:#dbeafe;">Password recovery request</div>
              </td>
            </tr>
            <tr>
              <td style="padding:34px;">
                <h1 style="margin:0 0 10px;font-size:28px;line-height:36px;color:#111827;">Reset your password</h1>
                <p style="margin:0;font-size:16px;line-height:26px;color:#4b5563;">
                  We received a request to reset the password for {{ .Email }}. Use the button below to choose a new password.
                </p>
                <div style="margin:30px 0;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0757e6;color:#ffffff;text-decoration:none;font-size:16px;font-weight:700;padding:15px 24px;border-radius:10px;box-shadow:0 10px 22px rgba(7,87,230,0.25);">
                    Reset Password
                  </a>
                </div>
                <p style="margin:0;font-size:14px;line-height:22px;color:#6b7280;">
                  If you did not request this, ignore this email. Your password will stay unchanged.
                </p>
              </td>
            </tr>
          </table>
          <p style="margin:22px 0 0;font-size:12px;color:#9ca3af;">Healthwealth • FinanceFlow</p>
        </td>
      </tr>
    </table>
  </body>
</html>
